AWSTemplateFormatVersion: "2010-09-09"
Description: Penpot single-node deployment using a prebuilt AMI

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: EC2 Launch Configuration
        Parameters:
          - AmiId
          - InstanceType
          - RootVolumeSize
          - KeyName
          - VpcId
          - SubnetId
          - LoadBalancerSubnetId
          - SshCidr
      - Label:
          default: Penpot Application Configuration
        Parameters:
          - AccessMode
          - PenpotPublicUri
          - PenpotSecretKey
          - PenpotVersion
          - DeploymentMode
          - DatabaseMode
      - Label:
          default: HTTPS Configuration
        Parameters:
          - DomainName
          - AcmCertificateArn
      - Label:
          default: Database Configuration
        Parameters:
          - ExternalDatabaseHost
          - ExternalDatabasePort
          - ExternalDatabaseName
          - ExternalDatabaseUsername
          - ExternalDatabasePassword
      - Label:
          default: SMTP Configuration
        Parameters:
          - PenpotEnableSmtp
          - PenpotSmtpDefaultFrom
          - PenpotSmtpDefaultReplyTo
          - PenpotSmtpHost
          - PenpotSmtpPort
          - PenpotSmtpUsername
          - PenpotSmtpPassword
          - PenpotSmtpTls
          - PenpotSmtpSsl
    ParameterLabels:
      AmiId:
        default: Penpot AMI ID
      InstanceType:
        default: EC2 Instance Type
      RootVolumeSize:
        default: Root Volume Size
      KeyName:
        default: EC2 Key Pair
      VpcId:
        default: VPC
      SubnetId:
        default: Subnet
      LoadBalancerSubnetId:
        default: ALB Secondary Subnet
      SshCidr:
        default: SSH Access CIDR
      AccessMode:
        default: Access Mode
      PenpotPublicUri:
        default: Penpot Public URI
      PenpotSecretKey:
        default: Penpot Secret Key
      PenpotVersion:
        default: Penpot Version
      DeploymentMode:
        default: Deployment Mode
      DatabaseMode:
        default: Database Mode
      DomainName:
        default: Domain Name
      AcmCertificateArn:
        default: ACM Certificate ARN
      ExternalDatabaseHost:
        default: External Database Host
      ExternalDatabasePort:
        default: External Database Port
      ExternalDatabaseName:
        default: External Database Name
      ExternalDatabaseUsername:
        default: External Database Username
      ExternalDatabasePassword:
        default: External Database Password
      PenpotEnableSmtp:
        default: Enable SMTP
      PenpotSmtpDefaultFrom:
        default: Default From Address
      PenpotSmtpDefaultReplyTo:
        default: Default Reply-To Address
      PenpotSmtpHost:
        default: SMTP Host
      PenpotSmtpPort:
        default: SMTP Port
      PenpotSmtpUsername:
        default: SMTP Username
      PenpotSmtpPassword:
        default: SMTP Password
      PenpotSmtpTls:
        default: Use STARTTLS
      PenpotSmtpSsl:
        default: Use SSL

Parameters:
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for the Penpot single-node image

  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type used for the Penpot host
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge

  RootVolumeSize:
    Type: Number
    Default: 20
    MinValue: 16
    Description: Size in GiB for the EC2 root EBS volume. Increase this if container image extraction or local Docker storage needs more space.

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair for host access

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where the Penpot instance will be launched

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet where the Penpot instance will be launched

  LoadBalancerSubnetId:
    Type: String
    Default: ""
    Description: Second public subnet for the ALB in a different Availability Zone than SubnetId. Required when AccessMode is https-alb
    AllowedPattern: ^$|^subnet-[0-9a-f]+$
    ConstraintDescription: Must be empty for http-direct or a valid subnet ID such as subnet-0123456789abcdef0

  SshCidr:
    Type: String
    Description: CIDR block allowed to connect to the instance over SSH. Required to avoid exposing SSH to the whole internet by default
    AllowedPattern: ^(?:((?:25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|1?[0-9]?[0-9])/(?:3[0-2]|[12]?[0-9]))$
    ConstraintDescription: Must be a valid IPv4 CIDR block such as 203.0.113.10/32

  AccessMode:
    Type: String
    Default: http-direct
    AllowedValues:
      - http-direct
      - https-alb
    Description: Access path exposed to customers. Use http-direct for the current prototype flow or https-alb to expose Penpot through an Application Load Balancer with ACM

  PenpotPublicUri:
    Type: String
    Default: ""
    Description: Optional public URL used by Penpot. Leave empty to derive it automatically. In https-alb mode, the recommended value is empty so the stack derives https://<DomainName>.

  PenpotSecretKey:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: Random secret used by Penpot sessions and tokens
    ConstraintDescription: Must be at least 32 characters long

  PenpotVersion:
    Type: String
    Default: latest
    Description: Penpot container image version to deploy

  DeploymentMode:
    Type: String
    Default: production
    AllowedValues:
      - production
      - test
    Description: Deployment behavior. Use production for normal email-based flows and test to disable email verification.

  DatabaseMode:
    Type: String
    Default: local
    AllowedValues:
      - local
      - external
    Description: Database topology. Use local to run PostgreSQL inside the instance or external to connect Penpot to a customer-managed PostgreSQL service.

  DomainName:
    Type: String
    Default: ""
    Description: Public DNS name used when AccessMode is https-alb. The customer must manage the DNS record for this name and point it to the ALB

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: ACM certificate ARN used by the ALB HTTPS listener when AccessMode is https-alb. The certificate must exist in the same region and cover DomainName

  ExternalDatabaseHost:
    Type: String
    Default: ""
    Description: PostgreSQL host used when DatabaseMode is external

  ExternalDatabasePort:
    Type: Number
    Default: 5432
    Description: PostgreSQL port used when DatabaseMode is external

  ExternalDatabaseName:
    Type: String
    Default: penpot
    Description: PostgreSQL database name used when DatabaseMode is external

  ExternalDatabaseUsername:
    Type: String
    Default: ""
    Description: PostgreSQL username used when DatabaseMode is external

  ExternalDatabasePassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: PostgreSQL password used when DatabaseMode is external

  PenpotEnableSmtp:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable SMTP support in Penpot

  PenpotSmtpDefaultFrom:
    Type: String
    Default: no-reply@example.com
    Description: Default From email address used by Penpot

  PenpotSmtpDefaultReplyTo:
    Type: String
    Default: no-reply@example.com
    Description: Default Reply-To email address used by Penpot

  PenpotSmtpHost:
    Type: String
    Default: ""
    Description: SMTP server hostname. Leave empty if SMTP is disabled

  PenpotSmtpPort:
    Type: Number
    Default: 587
    Description: SMTP server port

  PenpotSmtpUsername:
    Type: String
    Default: ""
    Description: SMTP username. Leave empty if SMTP is disabled

  PenpotSmtpPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: SMTP password. Leave empty if SMTP is disabled

  PenpotSmtpTls:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable STARTTLS for SMTP connections

  PenpotSmtpSsl:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable implicit SSL for SMTP connections

Mappings: {}

Conditions:
  HasPenpotPublicUri: !Not [!Equals [!Ref PenpotPublicUri, ""]]
  UseAlbHttps: !Equals [!Ref AccessMode, https-alb]
  UseExternalDatabase: !Equals [!Ref DatabaseMode, external]

Rules:
  DomainNameRequiredWhenUsingAlbHttps:
    RuleCondition: !Equals [!Ref AccessMode, https-alb]
    Assertions:
      - Assert: !Not [!Equals [!Ref DomainName, ""]]
        AssertDescription: DomainName must be provided when AccessMode is https-alb
      - Assert: !Not [!Equals [!Ref AcmCertificateArn, ""]]
        AssertDescription: AcmCertificateArn must be provided when AccessMode is https-alb
      - Assert: !Not [!Equals [!Ref LoadBalancerSubnetId, ""]]
        AssertDescription: LoadBalancerSubnetId must be provided when AccessMode is https-alb
      - Assert: !Not [!Equals [!Ref LoadBalancerSubnetId, !Ref SubnetId]]
        AssertDescription: LoadBalancerSubnetId must be different from SubnetId when AccessMode is https-alb
  SmtpSettingsRequiredWhenEnabled:
    RuleCondition: !Equals [!Ref PenpotEnableSmtp, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref PenpotSmtpHost, ""]]
        AssertDescription: PenpotSmtpHost must be provided when SMTP is enabled
      - Assert: !Not [!Equals [!Ref PenpotSmtpUsername, ""]]
        AssertDescription: PenpotSmtpUsername must be provided when SMTP is enabled
      - Assert: !Not [!Equals [!Ref PenpotSmtpPassword, ""]]
        AssertDescription: PenpotSmtpPassword must be provided when SMTP is enabled
  ExternalDatabaseSettingsRequiredWhenEnabled:
    RuleCondition: !Equals [!Ref DatabaseMode, external]
    Assertions:
      - Assert: !Not [!Equals [!Ref ExternalDatabaseHost, ""]]
        AssertDescription: ExternalDatabaseHost must be provided when DatabaseMode is external
      - Assert: !Not [!Equals [!Ref ExternalDatabaseUsername, ""]]
        AssertDescription: ExternalDatabaseUsername must be provided when DatabaseMode is external
      - Assert: !Not [!Equals [!Ref ExternalDatabasePassword, ""]]
        AssertDescription: ExternalDatabasePassword must be provided when DatabaseMode is external

Resources:
  PenpotInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: penpot-cloud-image-aws-instance-role
        - Key: Project
          Value: penpot-cloud-image-aws
        - Key: ManagedBy
          Value: cloudformation
        - Key: Repository
          Value: penpot-cloud-images

  PenpotInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref PenpotInstanceRole

  PenpotLoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: UseAlbHttps
    Properties:
      GroupDescription: Public HTTPS access for Penpot through the application load balancer
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: penpot-cloud-image-aws-alb-sg
        - Key: Project
          Value: penpot-cloud-image-aws
        - Key: ManagedBy
          Value: cloudformation
        - Key: Repository
          Value: penpot-cloud-images
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  PenpotSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Access for Penpot single-node
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: penpot-cloud-image-aws-sg
        - Key: Project
          Value: penpot-cloud-image-aws
        - Key: ManagedBy
          Value: cloudformation
        - Key: Repository
          Value: penpot-cloud-images
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshCidr
        - !If
          - UseAlbHttps
          - IpProtocol: tcp
            FromPort: 80
            ToPort: 80
            SourceSecurityGroupId: !Ref PenpotLoadBalancerSecurityGroup
          - IpProtocol: tcp
            FromPort: 80
            ToPort: 80
            CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  PenpotInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref PenpotInstanceProfile
      KeyName: !Ref KeyName
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            VolumeSize: !Ref RootVolumeSize
            VolumeType: gp3
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: "0"
          GroupSet:
            - !Ref PenpotSecurityGroup
          SubnetId: !Ref SubnetId
      Tags:
        - Key: Name
          Value: penpot-cloud-image-aws
        - Key: Project
          Value: penpot-cloud-image-aws
        - Key: ManagedBy
          Value: cloudformation
        - Key: Repository
          Value: penpot-cloud-images
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash
              set -euxo pipefail

              DEFAULT_PENPOT_PUBLIC_URI='${DefaultPenpotPublicUri}'
              PENPOT_PUBLIC_URI_INPUT='${PenpotPublicUri}'
              if [[ -z "$PENPOT_PUBLIC_URI_INPUT" ]]; then
                if [[ -n "$DEFAULT_PENPOT_PUBLIC_URI" ]]; then
                  export PENPOT_PUBLIC_URI="$DEFAULT_PENPOT_PUBLIC_URI"
                else
                  TOKEN=$(curl -fsSL -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
                  PUBLIC_HOSTNAME=$(curl -fsSL -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-hostname)
                  if [[ -n "$PUBLIC_HOSTNAME" ]]; then
                    export PENPOT_PUBLIC_URI="http://$PUBLIC_HOSTNAME"
                  else
                    PUBLIC_IP=$(curl -fsSL -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)
                    export PENPOT_PUBLIC_URI="http://$PUBLIC_IP"
                  fi
                fi
              else
                export PENPOT_PUBLIC_URI="$PENPOT_PUBLIC_URI_INPUT"
              fi

              export PENPOT_SECRET_KEY='${PenpotSecretKey}'
              export PENPOT_VERSION='${PenpotVersion}'
              export PENPOT_DATABASE_MODE='${DatabaseMode}'
              export PENPOT_FLAGS=''
              if [[ '${DeploymentMode}' == 'test' ]]; then
                export PENPOT_FLAGS='disable-email-verification'
              fi
              if [[ '${PenpotEnableSmtp}' == 'true' ]]; then
                if [[ -n "$PENPOT_FLAGS" ]]; then
                  export PENPOT_FLAGS="$PENPOT_FLAGS enable-smtp"
                else
                  export PENPOT_FLAGS='enable-smtp'
                fi
              fi
              export PENPOT_SMTP_DEFAULT_FROM='${PenpotSmtpDefaultFrom}'
              export PENPOT_SMTP_DEFAULT_REPLY_TO='${PenpotSmtpDefaultReplyTo}'
              export PENPOT_SMTP_HOST='${PenpotSmtpHost}'
              export PENPOT_SMTP_PORT='${PenpotSmtpPort}'
              export PENPOT_SMTP_USERNAME='${PenpotSmtpUsername}'
              export PENPOT_SMTP_PASSWORD='${PenpotSmtpPassword}'
              export PENPOT_SMTP_TLS='${PenpotSmtpTls}'
              export PENPOT_SMTP_SSL='${PenpotSmtpSsl}'
              if [[ '${DatabaseMode}' == 'external' ]]; then
                export PENPOT_DATABASE_HOST='${ExternalDatabaseHost}'
                export PENPOT_DATABASE_PORT='${ExternalDatabasePort}'
                export PENPOT_DATABASE_NAME='${ExternalDatabaseName}'
                export PENPOT_DATABASE_USERNAME='${ExternalDatabaseUsername}'
                export PENPOT_DATABASE_PASSWORD='${ExternalDatabasePassword}'
              fi

              /opt/penpot/bin/configure-penpot.sh
              systemctl enable penpot-compose
              systemctl restart penpot-compose
              systemctl restart nginx
            - DefaultPenpotPublicUri: !If
                - UseAlbHttps
                - !Sub "https://${DomainName}"
                - ""

  PenpotInPlaceUpgradeAssociation:
    Type: AWS::SSM::Association
    Properties:
      Name: AWS-RunShellScript
      AssociationName: !Sub "penpot-cloud-image-aws-upgrade-${AWS::StackName}"
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref PenpotInstance
      Parameters:
        commands:
          - !Sub "/opt/penpot/bin/upgrade-penpot.sh '${PenpotVersion}'"
      WaitForSuccessTimeoutSeconds: 900

  PenpotLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Condition: UseAlbHttps
    Properties:
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref SubnetId
        - !Ref LoadBalancerSubnetId
      SecurityGroups:
        - !Ref PenpotLoadBalancerSecurityGroup
      Tags:
        - Key: Name
          Value: penpot-cloud-image-aws-alb
        - Key: Project
          Value: penpot-cloud-image-aws
        - Key: ManagedBy
          Value: cloudformation
        - Key: Repository
          Value: penpot-cloud-images

  PenpotTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: UseAlbHttps
    Properties:
      Port: 80
      Protocol: HTTP
      TargetType: instance
      VpcId: !Ref VpcId
      HealthCheckProtocol: HTTP
      HealthCheckPath: /
      Matcher:
        HttpCode: 200-399
      Targets:
        - Id: !Ref PenpotInstance
          Port: 80
      Tags:
        - Key: Name
          Value: penpot-cloud-image-aws-tg
        - Key: Project
          Value: penpot-cloud-image-aws
        - Key: ManagedBy
          Value: cloudformation
        - Key: Repository
          Value: penpot-cloud-images

  PenpotHttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: UseAlbHttps
    Properties:
      LoadBalancerArn: !Ref PenpotLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  PenpotHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: UseAlbHttps
    Properties:
      LoadBalancerArn: !Ref PenpotLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref AcmCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref PenpotTargetGroup

Outputs:
  InstanceId:
    Description: EC2 instance ID for the Penpot host
    Value: !Ref PenpotInstance

  PublicIp:
    Description: Public IPv4 address assigned to the Penpot host
    Value: !GetAtt PenpotInstance.PublicIp

  PublicDnsName:
    Description: Public DNS name assigned to the Penpot host
    Value: !GetAtt PenpotInstance.PublicDnsName

  LoadBalancerDnsName:
    Condition: UseAlbHttps
    Description: DNS name assigned by AWS to the Penpot application load balancer
    Value: !GetAtt PenpotLoadBalancer.DNSName

  PenpotUrl:
    Description: URL expected to expose the Penpot application after startup
    Value: !If
      - HasPenpotPublicUri
      - !Ref PenpotPublicUri
      - !If
        - UseAlbHttps
        - !Sub "https://${DomainName}"
        - !Sub "http://${PenpotInstance.PublicIp}"

  PenpotAccessHost:
    Description: Preferred host value to use for customer access and host-level troubleshooting
    Value: !If
      - HasPenpotPublicUri
      - !Select
        - 2
        - !Split
          - /
          - !Ref PenpotPublicUri
      - !If
        - UseAlbHttps
        - !Ref DomainName
        - !GetAtt PenpotInstance.PublicIp

  PenpotAccessUri:
    Description: URI value to use when accessing Penpot from a browser
    Value: !If
      - HasPenpotPublicUri
      - !Ref PenpotPublicUri
      - !If
        - UseAlbHttps
        - !Sub "https://${DomainName}"
        - !Sub "http://${PenpotInstance.PublicIp}"
